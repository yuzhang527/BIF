# Example grid sweep for BIF sampler diagnostics.
# Launch with:
#   python -m bif.cli sweep-bif --config configs/example_sweep_bif.yaml

base_run_config: example_run_bif.yaml
output_dir: /root/BIF/runs/bif_sweeps/example_sweep

# Optional overrides applied on top of base_run_config before each grid point.
# Keep these small for a first diagnostic sweep.
run_overrides:
  draws_per_chain: 100
  num_chains: 2
  num_burnin_steps: 100
  num_steps_bw_draws: 1
  sampler_type: sgld

sweep:
  lr:
    values: [1.0e-6, 1.0e-5, 1.0e-4]
  gamma:
    values: [10, 100, 1000]
  nbeta:
    values: [1, 10, 100]

baseline:
  # Adds one nbeta=0 run for every lr x gamma pair unless nbeta=0 is already in the grid.
  run_nbeta_zero: true
  # Compare each nonzero-nbeta run with the matched nbeta=0 run at the same lr/gamma.
  compare_to_nbeta_zero: true
  include_if_in_grid: true

analysis:
  score_col: cross_corr_mean_over_queries
  top_k: 150
  enable_aux_query_plots: false
  negate_scores: false

# Loss trace health is expected to be monitored by existing BIF/SwanLab charts.
# The diagnostics below focus on ranking stability.
diagnostics:
  checkpoint: null
  reduce_chains: stack
  split_stability:
    enabled: true
    num_splits: 20
    split_fraction: 0.5
    top_k: 150
    score_col: cross_corr_mean_over_queries
    pass_threshold: 0.8
    seed: 42
    min_draws: 8
  chain_stability:
    enabled: true
    top_k: 150
    score_col: cross_corr_mean_over_queries
    min_draws_per_chain: 4

execution:
  run_bif: true
  analyze_bif: true
  diagnostics: true
  skip_existing: true
  continue_on_error: true
  dry_run: false
  # Useful when running under torchrun or a custom env.
  extra_env: {}
